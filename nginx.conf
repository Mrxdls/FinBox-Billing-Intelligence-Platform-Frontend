# FinBox frontend — static SPA served by nginx.
# Listens on 3000 to match the backend's default CLIENT_URL.
server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip static assets
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Long-cache the fingerprinted build assets.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA history fallback: every unknown path resolves to index.html so
    # client-side routes (e.g. /dashboard) work on direct load / refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
